<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehai. - 恋人たちの気配</title>
    <style>
        /* ここに今までのCSSをそのまま残してね！ */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }
        #app-container, #login-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #4caf50;
            font-size: 1.8rem;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.1rem;
            color: #333;
            border-left: 4px solid #4caf50;
            padding-left: 8px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .login-input-group {
            margin-bottom: 15px;
        }
        .login-input-group label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .login-input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 15px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }
        .login-input-group input:focus {
            border-color: #4caf50;
        }
        /* ボタン共通 */
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #388e3c;
            transition: all 0.1s ease;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div id="login-container" style="display: none;">
        <h1>Kehai.</h1>
        <p style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px;">ふたりの秘密の合言葉（部屋名）を決めてね🌸</p>
        
        <div class="login-input-group">
            <label for="input-room">🌸 ふたりの部屋名（英語や数字）</label>
            <input type="text" id="input-room" placeholder="例: red_room">
        </div>
        
        <div class="login-input-group">
            <label for="input-name">👤 あなたのお名前</label>
            <input type="text" id="input-name" placeholder="例: haruka">
        </div>
        
        <button onclick="loginToRoom()" style="width: 100%; margin-top: 15px; background-color: #4caf50; box-shadow: 0 4px 0 #388e3c;">ふたりの部屋に入る 💕</button>
    </div>


    <div id="app-container" style="display: none; min-height: 580px;">
        
        <h1>Kehai.</h1>

        <div class="tab-container" style="display: flex; justify-content: space-around; background: rgba(255,255,255,0.8); padding: 10px 0; border-bottom: 1px solid #ddd; margin-bottom: 15px; border-radius: 8px 8px 0 0;">
            <button id="tab-my" onclick="switchTab('my')" style="flex: 1; background: none; border: none; font-size: 1rem; font-weight: bold; color: #4caf50; cursor: pointer; padding: 10px 0; border-bottom: 3px solid #4caf50; transition: all 0.3s;">じぶん 👤</button>
            <button id="tab-partner" onclick="switchTab('partner')" style="flex: 1; background: none; border: none; font-size: 1rem; font-weight: bold; color: #888; cursor: pointer; padding: 10px 0; border-bottom: 3px solid transparent; transition: all 0.3s;">あいて 👥</button>
        </div>

        <section id="partner-area" style="display: none; padding-top: 20px; min-height: 480px; box-sizing: border-box;">
            <h2>あいてのいま</h2>
            <div style="text-align: center; margin: 15px 0;">
                <img id="partner-avatar" src="image/woman1.png" alt="相手のキャラ" onclick="zoomPhoto(this)" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #4caf50; cursor: zoom-in; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            </div>
            <p style="font-size: 0.9rem; color: #888; font-weight: bold; margin-top: 8px; text-align: center;">あいてのいま：</p>
            <p id="partner-message" style="font-size: 1.1rem; font-weight: bold; color: #333; text-align: center; margin-top: 10px; background: #f0f0f0; padding: 12px 20px; border-radius: 15px; display: inline-block; min-width: 260px; max-width: 90%; margin-left: 50%; transform: translateX(-50%); box-sizing: border-box;">いまなにしてるかな？</p>
            <div id="effect-layer"></div>
        </section>

        <section id="my-area" style="display: block; padding-top: 20px;">
            <h2>じぶんのアバター（タップして変更）</h2>
            <div style="text-align: center; margin: 15px 0;">
                <img id="my-avatar-preview" src="image/woman1.png" alt="自分自身のアバター" onclick="openAvatarModal()" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #4caf50; cursor: pointer; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">本日あと <span id="upload-count">3</span> 回変更できます</p>
                <p style="font-size: 0.9rem; color: #4caf50; font-weight: bold; margin-top: 8px;">いまのあなた：<span id="my-current-status">未設定</span></p>
            </div>
            
            <h2>いまの気配を伝える（エフェクト付き！）</h2>
            <div class="status-buttons" style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
                <button onclick="changeStatus('🏠 今家でまったり中')">🏠 まったり</button>
                <button onclick="changeStatus('🔥 仕事頑張ってる！')">🔥 仕事がんばる</button>
                <button onclick="changeStatus('💻 パソコンにかじりつき')">💻 パソコン</button>
                <button onclick="changeStatus('🍰 おやつタイム☕️')">🍰 おやつ</button>
                <button onclick="changeStatus('🌙 これから寝るね、おやすみ')">🌙 寝るね</button>
                <button onclick="changeStatus('❤️ 愛してる')">❤️ 愛してる</button>
                <button onclick="changeStatus('✨ 大好き')">✨ 大好き</button>
            </div>

            <div class="message-input" style="display: flex; gap: 8px; margin-bottom: 15px;">
                <input type="text" id="my-message-text" placeholder="自由に入力して送信もできるよ" style="flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 24px; outline: none;">
                <button onclick="sendStatus()">送信</button>
            </div>

            <div class="photo-upload" style="margin-bottom: 15px;">
                <input type="file" id="bg-photo-input" accept="image/*" style="display: none;" onchange="uploadBackground()">
                <button onclick="document.getElementById('bg-photo-input').click()" style="background-color: #81c784; box-shadow: 0 3px 0 #66bb6a; width: 100%;">背景画像を変更する</button>
            </div>
        </section>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
